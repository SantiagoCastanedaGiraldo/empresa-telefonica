<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Plan</title>

    <!-- Importamos Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Registrar Plan Telefónico</h1>

    <!-- Formulario para crear o editar un plan -->
    <form th:action="@{/planes/guardar}" th:object="${plan}" method="post">

        <!-- Campo oculto para guardar el id cuando se edita -->
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre del plan</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Datos en GB</label>
            <input type="number" step="0.01" th:field="*{datosGB}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Minutos</label>
            <input type="number" step="0.01" th:field="*{minutos}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>

        <a href="/planes" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
