<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>

    <!-- Importamos Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Clientes</h1>

    <a href="/clientes/nuevo" class="btn btn-primary mb-3">
        Nuevo Cliente
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Dirección</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <!-- Recorremos la lista de clientes enviada desde ClienteController -->
        <tr th:each="cliente : ${clientes}">

            <td th:text="${cliente.id}"></td>
            <td th:text="${cliente.nombre}"></td>
            <td th:text="${cliente.cedula}"></td>
            <td th:text="${cliente.telefono}"></td>
            <td th:text="${cliente.correo}"></td>
            <td th:text="${cliente.direccion}"></td>

            <td>
                <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
