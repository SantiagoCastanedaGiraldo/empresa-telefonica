<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planes Telefónicos</title>

    <!-- Importamos Bootstrap para mejorar la apariencia -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Título principal de la página -->
    <h1 class="text-center mb-4">Planes Telefónicos</h1>

    <!-- Botón para crear un nuevo plan -->
    <a href="/planes/nuevo" class="btn btn-primary mb-3">
        Nuevo Plan
    </a>

    <!-- Tabla donde se mostrarán los planes registrados -->
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Datos GB</th>
            <th>Minutos</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <!--
             Thymeleaf recorrerá todos los planes enviados
             desde PlanController
        -->
        <tr th:each="plan : ${planes}">

            <td th:text="${plan.id}"></td>
            <td th:text="${plan.nombre}"></td>
            <td th:text="${plan.precio}"></td>
            <td th:text="${plan.datosGB}"></td>
            <td th:text="${plan.minutos}"></td>
            <td th:text="${plan.descripcion}"></td>

            <td>

                <!-- Botón para editar -->
                <a th:href="@{/planes/editar/{id}(id=${plan.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <!-- Botón para eliminar -->
                <a th:href="@{/planes/eliminar/{id}(id=${plan.id})}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
