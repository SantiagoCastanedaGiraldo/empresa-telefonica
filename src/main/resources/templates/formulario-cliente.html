<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Cliente</title>

    <!-- Importamos Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Registrar Cliente</h1>

    <!-- Formulario para crear o editar un cliente -->
    <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">

        <!-- Campo oculto para guardar el id cuando se edita -->
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Cédula</label>
            <input type="text" th:field="*{cedula}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" th:field="*{telefono}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" th:field="*{correo}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" th:field="*{direccion}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>

        <a href="/clientes" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
